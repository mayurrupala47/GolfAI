<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Golf AI - Real-time Live Tracking Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 28, 48, 0.65);
            --accent-cyan: #00f0ff;
            --accent-green: #39ff14;
            --accent-gold: #ffbe0b;
            --text-color: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(57, 255, 20, 0.03) 0%, transparent 45%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 20px 40px;
            background: rgba(11, 15, 25, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(57, 255, 20, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }

        .status-container {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        main {
            flex: 1;
            padding: 30px 40px;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 30px;
            max-width: 1800px;
            width: 100%;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .video-panel {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            min-height: 480px;
        }

        .video-feed {
            width: 100%;
            height: auto;
            max-height: 75vh;
            border-radius: 10px;
            object-fit: contain;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            transition: all 0.25s ease;
        }

        .player-row:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateX(4px);
        }

        .player-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-cyan);
        }

        .stroke-badge {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-cyan);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid rgba(0, 240, 255, 0.25);
        }

        /* Toast Container */
        #toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .toast {
            background: rgba(11, 15, 25, 0.95);
            border-left: 5px solid var(--accent-cyan);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 320px;
            backdrop-filter: blur(10px);
            transform: translateX(120%);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toast-body {
            font-size: 13px;
            color: #cbd5e1;
        }

        .no-data {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>MINI GOLF AI DASHBOARD</h1>
        <div class="status-container">
            <span class="status-dot"></span>
            <span>LIVE TRACKING ACTIVE</span>
        </div>
    </header>

    <main>
        <div class="video-panel">
            <img src="/video_feed" class="video-feed" alt="Live Camera Feed" id="video-stream">
        </div>
        <div class="sidebar">
            <div class="card">
                <h2><span>ACTIVE STROKES</span></h2>
                <div class="leaderboard-list" id="leaderboard">
                    <div class="no-data" id="no-data-msg">Waiting for strokes...</div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script>
        const leaderboard = document.getElementById("leaderboard");
        const noDataMsg = document.getElementById("no-data-msg");
        const toastContainer = document.getElementById("toast-container");
        const activeBalls = {};

        // Listen for real-time stroke events sent from the Python backend
        const eventSource = new EventSource("/events");
        let isDisconnected = false;

        eventSource.onerror = function() {
            isDisconnected = true;
            console.log("EventSource disconnected. Backend is likely restarting...");
        };

        eventSource.onopen = function() {
            if (isDisconnected) {
                console.log("Backend came back online! Reloading page...");
                window.location.reload();
            }
        };

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.event === "camera_connected") {
                console.log("Camera stream connected! Reloading video stream...");
                const img = document.getElementById("video-stream");
                if (img) {
                    img.src = "/video_feed?t=" + Date.now();
                }
            } else if (data.event === "stroke" || data.event === "reset" || data.event === "tee_placed" || data.event === "hole_complete") {
                const ballId = data.ball_id;
                const strokes = data.stroke_count;
 
                 // Update leaderboard state
                 activeBalls[ballId] = strokes;
                 updateLeaderboard();
 
                 // Trigger animated toast notification popup
                 showEventToast(ballId, strokes, data.event);
             }
         };

        function updateLeaderboard() {
            // Remove no data message if we have registered balls
            const keys = Object.keys(activeBalls);
            if (keys.length > 0) {
                noDataMsg.style.display = "none";
            }

            // Render/Update entries
            keys.forEach(ballId => {
                let row = document.getElementById(`ball-row-${ballId}`);
                if (!row) {
                    row = document.createElement("div");
                    row.id = `ball-row-${ballId}`;
                    row.className = "player-row";
                    row.innerHTML = `
                        <div class="player-name">
                            <span class="player-dot"></span>
                            <span>Ball #${ballId}</span>
                        </div>
                        <div class="stroke-badge" id="ball-strokes-${ballId}">0</div>
                    `;
                    leaderboard.appendChild(row);
                }
                document.getElementById(`ball-strokes-${ballId}`).innerText = `${activeBalls[ballId]} Strokes`;
            });
        }

        function showEventToast(ballId, strokes, eventType) {
            const toast = document.createElement("div");
            toast.className = "toast";
            
            if (eventType === "tee_placed" || eventType === "reset") {
                toast.innerHTML = `
                    <div class="toast-title">⛳ Tee Position Confirmed</div>
                    <div class="toast-body">Ball #${ballId} is perfectly placed on the tee. Ready to play!</div>
                `;
            } else if (eventType === "hole_complete") {
                toast.innerHTML = `
                    <div class="toast-title">🎉 Hole Complete!</div>
                    <div class="toast-body">Ball #${ballId} is in the cup! Total Strokes: ${strokes}</div>
                `;
            } else {
                toast.innerHTML = `
                    <div class="toast-title">🏌️ Stroke Registered</div>
                    <div class="toast-body">Ball #${ballId} just registered stroke #${strokes}!</div>
                `;
            }
            
            toastContainer.appendChild(toast);

            // Trigger slide-in animation
            setTimeout(() => {
                toast.classList.add("show");
            }, 50);

            // Auto-remove toast after 4 seconds
            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => {
                    toast.remove();
                }, 400);
            }, 4000);
        }
    </script>
</body>
</html>
